<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hollow Knight: PVP Legend</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; color: white; font-family: 'Times New Roman', serif; }
        canvas { display: block; margin: 0 auto; box-shadow: inset 0 0 150px rgba(0,0,0,1); cursor: crosshair; }
        
        /* Lobby UI */
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 20, 0.9); padding: 30px; border: 2px solid #00e5ff; border-radius: 10px; z-index: 100; text-align: center; }
        #lobby h2 { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; margin-top: 0; }
        input { padding: 10px; width: 200px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; text-align: center;}
        button { padding: 10px 20px; background: #00e5ff; border: none; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #00e5ff; }
        #conn-status { font-size: 14px; color: #aaa; margin-top: 15px; }

        /* Game UI */
        #ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px 2px #000; z-index: 10; pointer-events: none; display: none;}
        .bar-bg { width: 200px; height: 12px; background: #222; border: 2px solid #555; margin-top: 5px; margin-bottom: 5px; }
        .hp-fill { height: 100%; background: #eee; transition: width 0.1s; }
        .soul-fill { height: 100%; background: #00e5ff; transition: width 0.2s; box-shadow: 0 0 10px #00e5ff; }
        
        .instruction { font-size: 14px; color: #aaa; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 1px solid #333; line-height: 1.6;}
        #warning { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); font-size: 36px; color: #ff3333; font-weight: bold; text-shadow: 0 0 20px #f00; display: none; z-index: 10; pointer-events: none; text-align: center;}
        
        b.highlight { color: #00e5ff; } 
        b.dash { color: #fff; text-shadow: 0 0 8px #fff; border-bottom: 1px dotted #fff; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>Multiplayer PVP Arena</h2>
        <input type="text" id="roomId" placeholder="Enter Room ID (e.g., arena1)">
        <br>
        <button onclick="initMultiplayer('host')">Create Room (Host)</button>
        <button onclick="initMultiplayer('join')">Join Room (Guest)</button>
        <div id="conn-status">Waiting for action...</div>
    </div>

    <div id="ui">
        <div>You (Hubble): <span id="player-hp">25</span> / 25</div>
        <div class="bar-bg"><div class="hp-fill" id="hp-bar" style="width: 100%;"></div></div>
        <div>Opponent HP: <span id="opp-hp-val">25</span> / 25</div>
        <div class="bar-bg"><div class="hp-fill" id="opp-hp-bar" style="width: 100%; background: #c23b22;"></div></div>
        <div>Soul: <span id="player-soul">0</span> / 99</div>
        <div class="bar-bg"><div class="soul-fill" id="soul-bar" style="width: 0%;"></div></div>
        
        <div class="instruction">
            [A/D] Move | [W/Space] Jump | <b class="dash">[L] Dash</b><br>
            [J] Slash | [W+J] Up Slash | [S+J] Down Slash<br>
            <b class="highlight">[K] Spell</b> | <b>[Hold F] Heal</b>
        </div>
    </div>

    <div id="warning"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize();

const keys = { w:false, a:false, s:false, d:false, j:false, k:false, l:false, f:false, space:false };
const prevKeys = { ...keys };

// ================= Networking System =================
let peer, conn;
let isHost = false;
let gameStarted = false;

function initMultiplayer(role) {
    const id = document.getElementById('roomId').value.trim();
    if(!id) return alert("Please enter a Room ID!");
    
    document.getElementById('conn-status').innerText = "Connecting to P2P network...";
    const peerId = role === 'host' ? 'hkpvp-' + id : null;
    peer = new Peer(peerId);

    peer.on('open', (myId) => {
        if(role === 'host') {
            document.getElementById('conn-status').innerText = "Room created. Waiting for opponent...";
            isHost = true;
        } else {
            document.getElementById('conn-status').innerText = "Searching for room...";
            connectToHost('hkpvp-' + id);
        }
    });

    peer.on('connection', (c) => {
        conn = c; setupDataHandlers();
    });

    peer.on('error', err => {
        alert("Connection failed: " + err.type);
        location.reload();
    });
}

function connectToHost(hostId) {
    conn = peer.connect(hostId);
    setupDataHandlers();
}

function setupDataHandlers() {
    conn.on('open', () => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        gameStarted = true;
        showWarning("FIGHT!", 2000);
    });

    conn.on('data', (data) => {
        otherPlayer.x = data.x;
        otherPlayer.y = data.y;
        otherPlayer.hp = data.hp;
        otherPlayer.facing = data.facing;
        otherPlayer.isDash = data.isDash;
        otherPlayer.attackT = data.attackT;
        otherPlayer.attackD = data.attackD;
        otherPlayer.isFocus = data.isFocus;
        otherPlayer.focusT = data.focusT;
        
        if(data.spawnSpell) {
            projectiles.push({ x: data.spellX, y: data.spellY, vx: data.spellVX, w: 90, h: 55, life: 100, facing: data.facing, isFromOpp: true });
        }
    });
}

function syncData() {
    if(conn && conn.open) {
        conn.send({
            x: player.x, y: player.y, hp: player.hp, 
            facing: player.facing, isDash: player.isDash,
            attackT: player.attackT, attackD: player.attackD,
            isFocus: player.isFocus, focusT: player.focusT,
            spawnSpell: localSpawnSpell,
            spellX: player.facing === 1 ? player.x + player.w : player.x - 90,
            spellY: player.y - 25, spellVX: player.facing * 18
        });
        localSpawnSpell = false; 
    }
}

// ================= Game Logic =================
let hitStopFrames = 0, screenShake = 0, particles = [], projectiles = [], shockwaves = [];
let localSpawnSpell = false;
let gameOver = false;
const map = { floor: 650, walls: [{x: 50, y:-500, w: 20, h:1500}, {x: 1400, y:-500, w: 20, h:1500}] };

function showWarning(text, duration = 3000) { 
    const w = document.getElementById('warning'); 
    w.innerHTML = text; w.style.display = 'block'; 
    setTimeout(() => w.style.display = 'none', duration); 
}

window.addEventListener('keydown', e => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k]=true; if(k===' ') keys.space=true; });
window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k]=false; if(k===' ') keys.space=false; });

function spawnParticles(x, y, color, count, speed) { for(let i=0; i<count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed - 2, life: 1.0, color, size: Math.random()*3+2 }); }
function checkRectOverlap(r1, r2) { return r1 && r2 && r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

// Local Player
const player = {
    x: 200, y: 500, w: 30, h: 45, vx: 0, vy: 0, speed: 7, jumpPower: -14, gravity: 0.7, facing: 1, hp: 25, maxHp: 25, soul: 0,
    isGrounded: false, canDJ: true, invincible: 0, isDash: false, dashD: 0, dashC: 0, attackT: 0, attackD: 'fw', isFocus: false, focusT: 0,

    update() {
        if(this.hp <= 0 || gameOver) return;
        let jp = (keys.w || keys.space) && !(prevKeys.w || prevKeys.space);
        let ap = keys.j && !prevKeys.j;
        let sp = keys.k && !prevKeys.k;
        let dp = keys.l && !prevKeys.l;

        // Healing Logic
        if(keys.f && this.isGrounded && this.hp < this.maxHp && this.soul >= 33 && !this.isDash) {
            this.isFocus = true; this.vx = 0; this.focusT++;
            if(this.focusT >= 60) { 
                this.hp = Math.min(this.maxHp, this.hp + 1); this.soul -= 33; this.focusT = 0; 
                spawnParticles(this.x+15, this.y+20, '#fff', 50, 10); 
                screenShake = 8;
            }
        } else { this.isFocus = false; this.focusT = 0; }

        if(!this.isDash && !this.isFocus) {
            if(keys.a) { this.vx = -this.speed; this.facing = -1; }
            else if(keys.d) { this.vx = this.speed; this.facing = 1; }
            else { this.vx = 0; }

            if(jp && this.isGrounded) { this.vy = this.jumpPower; this.isGrounded = false; }
            else if(jp && this.canDJ) { this.vy = this.jumpPower * 0.85; this.canDJ = false; }

            // Spell Logic
            if(sp && this.soul >= 33) {
                this.soul -= 33; localSpawnSpell = true; this.vx = this.facing * -5;
                projectiles.push({ x: this.facing===1?this.x+this.w:this.x-90, y:this.y-25, vx: this.facing * 18, w: 90, h: 55, life: 100, facing: this.facing, isFromOpp: false });
            }

            // Directional Attack Logic
            if(ap && this.attackT <= 0) {
                this.attackT = 16;
                this.attackD = keys.w ? 'up' : (keys.s && !this.isGrounded ? 'down' : 'fw');
                
                let ab = { w: 75, h: 75 };
                if(this.attackD === 'up'){ ab.x=this.x-22; ab.y=this.y-65; } 
                else if(this.attackD === 'down'){ ab.x=this.x-22; ab.y=this.y+this.h; } 
                else { ab.x = this.facing === 1 ? this.x + this.w : this.x - ab.w; ab.y = this.y - 15; }

                if(checkRectOverlap(ab, otherPlayer)) {
                    spawnParticles(otherPlayer.x+15, otherPlayer.y+20, '#fff', 15, 8);
                    this.soul = Math.min(99, this.soul + 11);
                    hitStopFrames = 4; screenShake = 10;
                    if(this.attackD === 'down') { this.vy = -13; this.canDJ = true; } 
                    else if(this.attackD === 'up') { this.vy += 2; } 
                    else { this.vx = this.facing * -6; }
                }
            }
        }

        if(dp && this.dashC <= 0 && !this.isFocus) { this.isDash = true; this.dashD = 14; this.dashC = 45; this.vy = 0; this.invincible = 16;}
        if(this.isDash) { this.vx = this.facing * 20; this.dashD--; if(this.dashD<=0) this.isDash=false; }
        else { this.vy += this.gravity; }

        this.x += this.vx; this.y += this.vy;
        if(this.y + this.h >= map.floor) { this.y = map.floor - this.h; this.vy = 0; this.isGrounded = true; this.canDJ = true; }
        
        // Take Damage Logic from Opponent
        if(otherPlayer.attackT > 8 && this.invincible <= 0) {
            let oppAb = { w: 75, h: 75 };
            if(otherPlayer.attackD === 'up'){ oppAb.x=otherPlayer.x-22; oppAb.y=otherPlayer.y-65; } 
            else if(otherPlayer.attackD === 'down'){ oppAb.x=otherPlayer.x-22; oppAb.y=otherPlayer.y+otherPlayer.h; } 
            else { oppAb.x = otherPlayer.facing === 1 ? otherPlayer.x + 30 : otherPlayer.x - 75; oppAb.y = otherPlayer.y - 15; }
            
            if(checkRectOverlap(this, oppAb)) { this.takeDamage(1, otherPlayer.x); }
        }

        if(this.invincible > 0) this.invincible--; if(this.attackT > 0) this.attackT--; if(this.dashC > 0) this.dashC--;
        
        // Update UI
        document.getElementById('player-hp').innerText = this.hp;
        document.getElementById('hp-bar').style.width = (this.hp/this.maxHp*100) + '%';
        document.getElementById('player-soul').innerText = this.soul;
        document.getElementById('soul-bar').style.width = (this.soul/99*100) + '%';
    },

    takeDamage(dmg, sourceX) {
        if(this.invincible > 0) return;
        this.hp -= dmg; this.invincible = 40; screenShake = 15; this.isFocus = false;
        if(sourceX !== undefined) this.vx = this.x > sourceX ? 12 : -12;
        this.vy = -8;
        spawnParticles(this.x+15, this.y+20, '#f00', 20, 10);
        if(this.hp <= 0) { showWarning("YOU DIED", 9999); gameOver = true; }
    },

    draw(isMe) {
        if(this.invincible > 0 && Math.floor(Date.now()/100)%2===0 && !this.isDash) return;

        // Draw Heal Effect
        if(this.isFocus && this.focusT > 0) {
            let p = this.focusT / 60; let r = 80 - p * 60;
            ctx.save(); ctx.translate(this.x+15, this.y+22); ctx.rotate(p * Math.PI * 4);
            ctx.strokeStyle = `rgba(255,255,255,${1-p})`; ctx.lineWidth = 2;
            for(let i=0; i<4; i++) { ctx.beginPath(); ctx.arc(0, 0, r, i*Math.PI/2, i*Math.PI/2 + Math.PI/4); ctx.stroke(); }
            ctx.restore();
            ctx.fillStyle = `rgba(255,255,255,${p*0.8})`; 
            ctx.beginPath(); ctx.arc(this.x+15, this.y+22, 25, 0, Math.PI*2); ctx.fill();
        }

        ctx.fillStyle = isMe ? (this.isDash ? '#000' : '#fff') : '#c23b22';
        ctx.beginPath(); ctx.arc(this.x+15, this.y+12, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.isDash ? '#000' : '#222';
        if(this.isDash) { ctx.shadowColor = '#555'; ctx.shadowBlur = 10; }
        ctx.beginPath(); ctx.moveTo(this.x+5, this.y+20); ctx.lineTo(this.x+25, this.y+20); ctx.lineTo(this.x+25-this.vx*0.5, this.y+this.h); ctx.lineTo(this.x+5-this.vx*0.5, this.y+this.h); ctx.fill(); ctx.shadowBlur = 0;

        // Draw Slash Arcs
        if(this.attackT > 8) {
            ctx.save(); ctx.translate(this.x+15, this.y+22);
            if(this.facing === -1 && this.attackD === 'fw') ctx.scale(-1, 1);
            ctx.shadowColor = isMe ? '#fff' : '#c23b22'; ctx.shadowBlur = 15; ctx.fillStyle = isMe ? '#fff' : '#c23b22';
            ctx.beginPath();
            if(this.attackD === 'up') { ctx.arc(0, 0, 60, Math.PI, Math.PI*2); ctx.arc(0, -10, 45, Math.PI*2, Math.PI, true); } 
            else if (this.attackD === 'down') { ctx.arc(0, 0, 60, 0, Math.PI); ctx.arc(0, 10, 45, Math.PI, 0, true); } 
            else { ctx.arc(0, 0, 55, -Math.PI/2, Math.PI/2); ctx.arc(10, 0, 40, Math.PI/2, -Math.PI/2, true); }
            ctx.fill(); ctx.restore();
        }
    }
};

const otherPlayer = { x: 1000, y: 500, w: 30, h: 45, hp: 25, facing: -1, isDash: false, attackT: 0, attackD: 'fw', isFocus: false, focusT: 0 };

function update() {
    if(!gameStarted) return;
    if(hitStopFrames > 0) { hitStopFrames--; return; }

    player.update();
    syncData();

    for(let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i];
        p.x += p.vx; p.life--;
        if(p.isFromOpp && checkRectOverlap(p, player) && player.invincible <= 0 && !player.isDash) {
            player.takeDamage(2, p.x); projectiles.splice(i, 1);
        } else if(p.life <= 0) projectiles.splice(i, 1);
    }

    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });

    document.getElementById('opp-hp-val').innerText = otherPlayer.hp;
    document.getElementById('opp-hp-bar').style.width = (otherPlayer.hp/25*100) + '%';
}

function draw() {
    ctx.fillStyle = '#05070a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    let camX = canvas.width>=1500 ? (canvas.width-1500)/2 : Math.max(canvas.width-1500, Math.min(0, canvas.width/2-player.x)); 
    let camY = canvas.height-730; 
    if(screenShake > 0) { camX+=(Math.random()-0.5)*screenShake; camY+=(Math.random()-0.5)*screenShake; screenShake *= 0.9; }
    ctx.translate(camX, camY);

    ctx.fillStyle = '#11151c'; ctx.fillRect(-1000, map.floor, 4000, 1000);

    if(gameStarted) {
        if(otherPlayer.hp > 0) player.draw.call(otherPlayer, false);
        if(player.hp > 0) player.draw(true);
    }

    projectiles.forEach(p => { 
        ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); if(p.facing === -1) ctx.scale(-1, 1); 
        ctx.shadowColor = p.isFromOpp ? '#f00' : '#00e5ff'; ctx.shadowBlur = 20; 
        let pGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, p.w); 
        pGrad.addColorStop(0, '#fff'); pGrad.addColorStop(0.5, p.isFromOpp ? '#f00' : '#00e5ff'); pGrad.addColorStop(1, 'rgba(0,0,0,0)'); 
        ctx.fillStyle = pGrad; ctx.beginPath(); ctx.moveTo(p.w/2, 0); ctx.quadraticCurveTo(p.w/4, p.h/2, -p.w/2, p.h/4); ctx.lineTo(-p.w/1.2, 0); ctx.lineTo(-p.w/2, -p.h/4); ctx.quadraticCurveTo(p.w/4, -p.h/2, p.w/2, 0); ctx.fill(); 
        ctx.restore(); 
    });
    
    particles.forEach(p => { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.restore();
}

function loop() {
    update();
    draw();
    for(let k in keys) prevKeys[k] = keys[k];
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
