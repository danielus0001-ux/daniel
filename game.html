<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Play - Game Portal</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #warp-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; position: relative; z-index: 10; }
        .back-btn { padding: 10px 20px; background: transparent; border: 2px solid #0ff; color: #0ff; text-decoration: none; font-weight: bold; border-radius: 30px; transition: 0.3s; }
        .back-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 15px #0ff; }
        h1 { margin: 0; font-size: 2rem; text-transform: uppercase; text-shadow: 0 0 10px #f0f; position: absolute; left: 50%; transform: translateX(-50%); }
        .iframe-container { width: 95%; max-width: 1400px; margin: 5px auto; height: 82vh; border-radius: 15px; padding: 3px; background: linear-gradient(45deg, #0ff, #f0f); position: relative; z-index: 10; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 12px; background: #111; }
    </style>
</head>
<body>
    <canvas id="warp-canvas"></canvas>
    <div class="header">
        <a href="index.html" class="back-btn">< BACK</a>
        <h1 id="gameTitle">LOADING...</h1>
        <div style="width: 80px;"></div>
    </div>
    <div class="iframe-container">
        <iframe id="frame" src=""></iframe>
    </div>
    <script>
        // 🚨 这里的路径已经完全按照你截图里的真实文件名修改了！
        const games = [
            {id: "stickmanclimb", title: "Stickmanclimb", path: "game/stickmanclimb/index.html"},
            {id: "minecraft", title: "Minecraft", path: "game/minecraft.html"},
            {id: "geometry-dash", title: "Geometry Dash", path: "game/geometry-dash.html"},
            {id: "hollow-knight", title: "Hollow Knight", path: "game/hollow-knight.html"},
            {id: "leveldevi", title: "LevelDevi", path: "game/LevelDevil/index.html"}, // 假设这是个文件夹，里面有index.html
            {id: "escape-road", title: "Escape Road", path: "game/escape-road.html"}
        ];
        const p = new URLSearchParams(location.search);
        const f = p.get("folder");
        const g = games.find(x => x.id === f);
          if(g){
            document.getElementById("gameTitle").innerText = g.title;
            // 🔥 加上动态时间戳，强制打碎套娃缓存！
            document.getElementById("frame").src = g.path + "?t=" + new Date().getTime();
        }
        
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        class Star {
            constructor() { this.reset(); }
            reset() { this.x = (Math.random() - 0.5) * 3000; this.y = (Math.random() - 0.5) * 3000; this.z = Math.random() * 2000; this.pz = this.z; }
            update() { this.z -= 10; if (this.z < 1) { this.reset(); this.z = 2000; this.pz = this.z; } }
            draw() {
                let sx = (this.x / this.z) * 400 + width / 2; let sy = (this.y / this.z) * 400 + height / 2;
                let px = (this.x / this.pz) * 400 + width / 2; let py = (this.y / this.pz) * 400 + height / 2;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy);
                ctx.lineWidth = (1 - (this.z / 2000)) * 2; ctx.strokeStyle = `rgba(255, 255, 255, ${1 - (this.z / 2000)})`; ctx.stroke();
                this.pz = this.z;
            }
        }
        for (let i = 0; i < 400; i++) stars.push(new Star());
        function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(0, 0, width, height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
