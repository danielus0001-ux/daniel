<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Game Portal</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #warp-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .header-title { grid-column: 1 / -1; text-align: center; font-size: 3rem; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 40px; text-shadow: 0 0 20px #0ff; color: #fff; }
        .card { background: rgba(15, 15, 15, 0.9); border: 2px solid #222; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s ease; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: #0ff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); }
        .card-bg { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; transition: 0.5s; text-transform: uppercase; letter-spacing: 2px; }
        .card:hover .card-bg { transform: scale(1.05); }
        .card-info { padding: 15px; border-top: 1px solid #333; }
        .card h3 { margin: 0; font-size: 1.2rem; color: #0ff; text-transform: uppercase; }
        .card p { color: #888; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="warp-canvas"></canvas>
    <div class="container">
        <h1 class="header-title">Game Center</h1>
        
        <div class="card" onclick="location.href='game.html?folder=minecraft'">
            <div class="card-bg" style="background: linear-gradient(45deg, #1a2a6c, #11998e, #38ef7d); color: #fff; text-shadow: 0 0 10px #fff;">MC</div>
            <div class="card-info"><h3>Minecraft</h3><p>Sandbox World</p></div>
        </div>

        <div class="card" onclick="location.href='game.html?folder=geometry-dash'">
            <div class="card-bg" style="background: linear-gradient(45deg, #ff9966, #ff5e62); color: #fff; text-shadow: 0 0 10px #fff;">DASH</div>
            <div class="card-info"><h3>Geometry Dash</h3><p>Rhythm Action</p></div>
        </div>

        <div class="card" onclick="location.href='game.html?folder=hollow-knight'">
            <div class="card-bg" style="background: linear-gradient(45deg, #141e30, #243b55); color: #8a9bb8; text-shadow: 0 0 10px #8a9bb8;">KNIGHT</div>
            <div class="card-info"><h3 style="color:#8a9bb8;">Hollow Knight</h3><p>Beneath Dirtmouth</p></div>
        </div>

        <div class="card" onclick="location.href='game.html?folder=leveldevi'">
            <div class="card-bg" style="background: linear-gradient(45deg, #8E2DE2, #4A00E0); color: #fff; text-shadow: 0 0 10px #fff;">DEVI</div>
            <div class="card-info"><h3 style="color:#f0f;">LevelDevi</h3><p>Custom Editor</p></div>
        </div>

        <div class="card" onclick="location.href='game.html?folder=escape-road'">
            <div class="card-bg" style="background: linear-gradient(45deg, #f12711, #f5af19); color: #fff; text-shadow: 0 0 10px #fff;">ESCAPE</div>
            <div class="card-info"><h3 style="color:#f5af19;">Escape Road</h3><p>Fast Racing</p></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        class Star {
            constructor() { this.reset(); }
            reset() { this.x = (Math.random() - 0.5) * 3000; this.y = (Math.random() - 0.5) * 3000; this.z = Math.random() * 2000; this.pz = this.z; }
            update() { this.z -= 10; if (this.z < 1) { this.reset(); this.z = 2000; this.pz = this.z; } }
            draw() {
                let sx = (this.x / this.z) * 400 + width / 2; let sy = (this.y / this.z) * 400 + height / 2;
                let px = (this.x / this.pz) * 400 + width / 2; let py = (this.y / this.pz) * 400 + height / 2;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy);
                ctx.lineWidth = (1 - (this.z / 2000)) * 2; ctx.strokeStyle = `rgba(0, 255, 255, ${1 - (this.z / 2000)})`; ctx.stroke();
                this.pz = this.z;
            }
        }
        for (let i = 0; i < 400; i++) stars.push(new Star());
        function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(0, 0, width, height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
