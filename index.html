<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL - Game Terminal</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            min-height: 100vh;
            /* 深邃的暗黑背景，带一点点极弱的深蓝中心光晕 */
            background-color: #030303;
            background-image: radial-gradient(circle at 50% 15%, #10151a 0%, #030303 60%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部标题与搜索框区域 */
        .header-container {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 60px;
            width: 100%;
        }

        .portal-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0 0 30px 0;
            color: #fff;
            /* 还原图中的青色强发光效果 */
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px rgba(0, 255, 255, 0.5);
        }

        .search-bar {
            width: 85%;
            max-width: 500px;
            padding: 15px 25px;
            background: rgba(0, 20, 20, 0.2);
            border: 2px solid #0ff;
            border-radius: 30px;
            color: #0ff;
            font-size: 1rem;
            outline: none;
            /* 内外发光效果 */
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15) inset, 0 0 15px rgba(0, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        
        .search-bar::placeholder {
            color: rgba(0, 255, 255, 0.6);
        }
        
        .search-bar:focus {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3) inset, 0 0 25px rgba(0, 255, 255, 0.4);
            background: rgba(0, 30, 30, 0.4);
        }

        /* 游戏卡片网格布局 */
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1100px;
            padding: 0 20px 100px 20px;
        }

        /* 单个卡片的大外壳 */
        .card-wrapper {
            position: relative;
            width: 280px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-wrapper:hover {
            transform: translateY(-12px);
        }

        /* 底部酷炫的青色梯形倒影 */
        .card-shadow {
            position: absolute;
            bottom: -35px;
            left: 10%;
            width: 80%;
            height: 80px;
            background: linear-gradient(135deg, #0ff, #0077ff);
            /* 裁切成倒置的梯形/三角形 */
            clip-path: polygon(0 0, 100% 0, 65% 100%, 35% 100%);
            z-index: 1;
            opacity: 0.8;
            transition: opacity 0.4s, filter 0.4s;
            filter: drop-shadow(0 0 10px #0ff);
        }

        .card-wrapper:hover .card-shadow {
            opacity: 1;
            filter: drop-shadow(0 0 25px #0ff) brightness(1.2);
        }

        /* 主体黑色卡片 */
        .card-content {
            position: relative;
            z-index: 2;
            background: #0b0b10; /* 极深的灰黑色 */
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.03); /* 微微的一层反光边框 */
        }

        .card-content h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        .card-content p {
            color: #666;
            font-size: 0.85rem;
            margin: 10px 0 35px 0;
        }

        /* 紫红色 PLAY 按钮 */
        .play-btn {
            background: transparent;
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 40px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .card-wrapper:hover .play-btn {
            background: #f0f;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="portal-title">PORTAL</h1>
        <input type="text" class="search-bar" placeholder="Initialize search sequence..." disabled>
    </div>

    <div class="grid-container">

        <div class="card-wrapper" onclick="location.href='game.html?folder=minecraft&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Minecraft</h3>
                <p>Sandbox / Technical</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=geometry-dash&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Geometry Dash</h3>
                <p>Rhythm / Action</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=hollow-knight&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Hollow Knight</h3>
                <p>Metroidvania</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=leveldevi&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>LevelDevi</h3>
                <p>Custom Editor</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=escape-road&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Escape Road</h3>
                <p>Driving / Arcade</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

    </div>

</body>
</html>
