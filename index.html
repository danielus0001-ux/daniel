<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL - Game Terminal</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            min-height: 100vh;
            background-color: #030303;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #warp-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .header-container {
            position: relative; z-index: 1;
            text-align: center; margin-top: 80px; margin-bottom: 60px; width: 100%;
        }

        .portal-title {
            font-size: 4rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 8px; margin: 0 0 30px 0; color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px rgba(0, 255, 255, 0.5);
        }

        .search-bar {
            width: 85%; max-width: 500px; padding: 15px 25px;
            background: rgba(0, 20, 20, 0.6); border: 2px solid #0ff;
            border-radius: 30px; color: #0ff; font-size: 1rem; outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15) inset, 0 0 15px rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }
        
        .search-bar::placeholder { color: rgba(0, 255, 255, 0.5); }

        /* 🔥 控制横向排列的核心代码 */
        .grid-container {
            position: relative; z-index: 1;
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 40px; max-width: 1100px; padding: 0 20px 100px 20px;
        }

        .card-wrapper {
            position: relative; width: 280px; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-wrapper:hover { transform: translateY(-12px); }

        .card-shadow {
            position: absolute; bottom: -35px; left: 10%; width: 80%; height: 80px;
            background: linear-gradient(135deg, #0ff, #0077ff);
            clip-path: polygon(0 0, 100% 0, 65% 100%, 35% 100%);
            z-index: 1; opacity: 0.8; transition: opacity 0.4s, filter 0.4s;
            filter: drop-shadow(0 0 10px #0ff);
        }
        .card-wrapper:hover .card-shadow { opacity: 1; filter: drop-shadow(0 0 25px #0ff) brightness(1.2); }

        .card-content {
            position: relative; z-index: 2;
            background: rgba(11, 11, 16, 0.85); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 40px 20px; text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05);
        }

        .card-content h3 { margin: 0; font-size: 1.5rem; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .card-content p { color: #888; font-size: 0.85rem; margin: 10px 0 35px 0; }

        .play-btn {
            background: transparent; border: 2px solid #f0f; color: #f0f;
            padding: 10px 40px; border-radius: 30px; font-size: 0.95rem; font-weight: 800;
            cursor: pointer; transition: all 0.3s;
        }
        .card-wrapper:hover .play-btn { background: #f0f; color: #fff; box-shadow: 0 0 20px rgba(255, 0, 255, 0.6); }
    </style>
</head>
<body>

    <canvas id="warp-canvas"></canvas>

    <div class="header-container">
        <h1 class="portal-title">PORTAL</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Enter game name to search...">
    </div>

    <div class="grid-container" id="gameGrid">

        <div class="card-wrapper" onclick="window.open('game/stickmanclimb/index.html', '_blank')">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Stickman Climb</h3>
                <p>Physics / Climbing</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=minecraft&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Minecraft</h3>
                <p>Sandbox / Technical</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=geometry-dash&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Geometry Dash</h3>
                <p>Rhythm / Action</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=hollow-knight&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Hollow Knight</h3>
                <p>Metroidvania</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=leveldevi&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>LevelDevi</h3>
                <p>Custom Editor</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

        <div class="card-wrapper" onclick="location.href='game.html?folder=escape-road&v=new'">
            <div class="card-shadow"></div>
            <div class="card-content">
                <h3>Escape Road</h3>
                <p>Driving / Arcade</p>
                <button class="play-btn">PLAY</button>
            </div>
        </div>

    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.card-wrapper');

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(searchTerm) ? 'block' : 'none';
            });
        });

        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        
        class Star {
            constructor() { this.reset(); }
            reset() { 
                this.x = (Math.random() - 0.5) * 3000; this.y = (Math.random() - 0.5) * 3000; 
                this.z = Math.random() * 2000; this.pz = this.z; 
                this.color = Math.random() > 0.5 ? 'rgba(0, 255, 255, ' : 'rgba(255, 0, 255, ';
            }
            update() { this.z -= 12; if (this.z < 1) { this.reset(); this.z = 2000; this.pz = this.z; } }
            draw() {
                let sx = (this.x / this.z) * 400 + width / 2; let sy = (this.y / this.z) * 400 + height / 2;
                let px = (this.x / this.pz) * 400 + width / 2; let py = (this.y / this.pz) * 400 + height / 2;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy);
                let alpha = 1 - (this.z / 2000);
                ctx.lineWidth = alpha * 3; ctx.strokeStyle = this.color + alpha + ')'; ctx.stroke();
                this.pz = this.z;
            }
        }
        for (let i = 0; i < 300; i++) stars.push(new Star());
        function animate() { 
            ctx.fillStyle = 'rgba(3, 3, 3, 0.4)'; ctx.fillRect(0, 0, width, height); 
            stars.forEach(s => { s.update(); s.draw(); }); 
            requestAnimationFrame(animate); 
        }
        animate();
    </script>
</body>
</html>
